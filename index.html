<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Văn Hóa Việt Nam</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Inter&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #FDFCF8;
}
.font-serif {
    font-family: 'Cormorant Garamond', serif;
}
.hero-overlay {
    background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7));
}
</style>
</head>

<body>

<!-- HERO -->
<section class="relative h-screen flex items-center justify-center text-center text-white">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Ha_Long_Bay_in_Vietnam.jpg"
         class="absolute w-full h-full object-cover">
    <div class="hero-overlay absolute inset-0"></div>

    <div class="relative z-10">
        <h1 class="text-6xl font-serif">Văn Hóa Việt Nam</h1>
        <p class="mt-4">Khám phá vẻ đẹp đất nước hình chữ S</p>
    </div>
</section>

<!-- VIDEO -->
<section class="py-20 text-center bg-black text-white">
    <h2 class="text-4xl font-serif mb-10">Video Giới Thiệu</h2>

    <div class="max-w-4xl mx-auto">
        <iframe width="100%" height="500"
            src="https://www.youtube.com/embed/FzG4uDgje3M"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>
</section>

<!-- CULTURE -->
<section class="py-20 px-6">
    <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-10 items-center">
        
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Ao_dai_Vietnam.jpg"
             class="rounded-xl shadow-lg">

        <div>
            <h2 class="text-4xl font-serif mb-4">Nền Văn Hiến</h2>
            <p>
                Văn hóa Việt Nam là sự kết tinh của hơn 4000 năm lịch sử,
                mang đậm bản sắc dân tộc và tinh thần đoàn kết.
            </p>
        </div>
    </div>
</section>

<!-- FOOD -->
<section class="py-20 bg-black text-white px-6">
    <h2 class="text-4xl text-center font-serif mb-16">Ẩm Thực Việt Nam</h2>

    <div class="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">

        <div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Pho-Beef-Noodles-2008.jpg" class="rounded-xl">
            <h3 class="text-xl mt-4">Phở</h3>
        </div>

        <div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Banh_mi_thit.jpg" class="rounded-xl">
            <h3 class="text-xl mt-4">Bánh mì</h3>
        </div>

        <div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Vietnamese_iced_coffee.jpg" class="rounded-xl">
            <h3 class="text-xl mt-4">Cà phê sữa đá</h3>
        </div>

    </div>
</section>

<!-- PLACES -->
<section class="py-20 px-6">
    <h2 class="text-4xl text-center font-serif mb-16">Địa Danh</h2>

    <div class="grid md:grid-cols-2 gap-10 max-w-6xl mx-auto">

        <div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Ha_Long_Bay_in_Vietnam.jpg" class="rounded-xl">
            <h3 class="text-2xl mt-4">Vịnh Hạ Long</h3>
        </div>

        <div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/1c/Hoi_An_Lanterns.jpg" class="rounded-xl">
            <h3 class="text-2xl mt-4">Hội An</h3>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="bg-black text-white text-center py-10">
    <p>© 2026 Văn Hóa Việt Nam</p>
</footer>

<script>
lucide.createIcons();
</script>

</body>
</html>
