<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vietnam Culture Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<style>
html { scroll-behavior: smooth; }
.overlay {
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed w-full bg-black/60 backdrop-blur text-white z-50">
<div class="max-w-6xl mx-auto flex justify-between p-4">
<h1 class="font-bold">🇻🇳 Vietnam</h1>
<div class="space-x-4">
<a href="#food">Ẩm thực</a>
<a href="#gallery">Hình ảnh</a>
<a href="#places">Địa danh</a>
<a href="#quiz">Quiz</a>
</div>
</div>
</nav>

<div class="h-16"></div>

<!-- HERO -->
<section class="h-screen relative flex items-center justify-center text-white text-center">

<img src="https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=2000&q=80"
class="absolute w-full h-full object-cover">

<div class="absolute inset-0 bg-black/60"></div>

<div class="relative z-10" data-aos="fade-up">
<h1 class="text-7xl font-bold mb-4">Vietnam Culture</h1>
<p class="text-xl">Discover beauty & tradition</p>
</div>

</section>

<!-- FOOD FULL IMAGE -->
<section id="food" class="relative h-[500px] flex items-end text-white">

<img src="https://images.unsplash.com/photo-1582878826629-29b7ad1cdc43?auto=format&fit=crop&w=2000&q=80"
class="absolute w-full h-full object-cover">

<div class="overlay absolute inset-0"></div>

<div class="relative p-10">
<h2 class="text-4xl font-bold">Ẩm Thực Việt Nam</h2>
<p>Phở, bánh mì, cà phê – tinh hoa ẩm thực</p>
</div>

</section>

<!-- GALLERY -->
<section id="gallery" class="py-20 bg-gray-100">
<h2 class="text-5xl text-center mb-10">Thư Viện Hình Ảnh</h2>

<div class="grid md:grid-cols-3 gap-4 max-w-6xl mx-auto">

<img src="https://images.unsplash.com/photo-1524712245354-2c4e5e7124c5" class="rounded shadow hover:scale-105 transition">
<img src="https://images.unsplash.com/photo-1559592442-741e6b856d71" class="rounded shadow hover:scale-105 transition">
<img src="https://images.unsplash.com/photo-1605000797499-95a51c5269ae" class="rounded shadow hover:scale-105 transition">
<img src="https://images.unsplash.com/photo-1544145945-f904253d0c7b" class="rounded shadow hover:scale-105 transition">
<img src="https://images.unsplash.com/photo-1555921015-5532091f6026" class="rounded shadow hover:scale-105 transition">
<img src="https://images.unsplash.com/photo-1608889176073-4f6b6c4dcd71" class="rounded shadow hover:scale-105 transition">

</div>
</section>

<!-- PLACES IMAGE CARDS -->
<section id="places" class="py-20 text-center">
<h2 class="text-5xl mb-10">Địa Danh</h2>

<div class="grid md:grid-cols-2 gap-6 max-w-5xl mx-auto">

<div class="relative group">
<img src="https://images.unsplash.com/photo-1524712245354-2c4e5e7124c5" class="rounded-xl">
<div class="overlay absolute inset-0 opacity-0 group-hover:opacity-100 transition flex items-end p-6 text-white">
<div>
<h3 class="text-2xl">Hạ Long</h3>
<a href="https://maps.google.com/?q=Ha+Long+Bay" target="_blank">📍 Map</a>
</div>
</div>
</div>

<div class="relative group">
<img src="https://images.unsplash.com/photo-1559592442-741e6b856d71" class="rounded-xl">
<div class="overlay absolute inset-0 opacity-0 group-hover:opacity-100 transition flex items-end p-6 text-white">
<div>
<h3 class="text-2xl">Hội An</h3>
<a href="https://maps.google.com/?q=Hoi+An" target="_blank">📍 Map</a>
</div>
</div>
</div>

</div>
</section>

<!-- MAP -->
<section class="py-20 bg-gray-100 text-center">
<h2 class="text-4xl mb-6">Bản đồ</h2>

<iframe 
src="https://maps.google.com/maps?q=Vietnam&t=&z=5&ie=UTF8&iwloc=&output=embed"
class="w-full h-96">
</iframe>

</section>

<!-- QUIZ -->
<section id="quiz" class="py-20 bg-black text-white text-center">

<h2 class="text-4xl mb-6">Quiz</h2>

<form id="quiz-form">

<p>Phở là gì?</p>
<label><input type="radio" name="q1" value="1"> Món ăn</label>
<label><input type="radio" name="q1" value="0"> Trang phục</label>

<br><br>

<button type="button" onclick="submitQuiz()" class="bg-yellow-400 text-black px-6 py-2 rounded">
Kết quả
</button>

</form>

<div id="result" class="mt-6 hidden"></div>

</section>

<!-- FOOTER -->
<footer class="bg-gray-900 text-white text-center py-10">
<p>📧 thophuongthao28@gmail.com</p>
<p class="text-gray-400">© 2026 Vietnam Culture</p>
</footer>

<script>
AOS.init();

function submitQuiz(){
let score = 0;
const data = new FormData(document.getElementById("quiz-form"));
for (let v of data.values()) score += parseInt(v);

const result = document.getElementById("result");
result.innerText = "Điểm: " + score;
result.classList.remove("hidden");
}
</script>

</body>
</html>
